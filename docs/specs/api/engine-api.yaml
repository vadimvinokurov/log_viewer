# Log Viewer API Specification

**Version:** 1.0  
**Last Updated:** 2026-03-13  
**Project Context:** Python Tooling (Desktop Application)

---

## §1 Overview

This document specifies the public API for the Log Viewer application. All public classes and methods are documented with their signatures, parameters, return types, and usage examples.

---

## §2 Models

### §2.1 LogEntry

```python
from dataclasses import dataclass
from src.models.log_level import LogLevel

@dataclass(frozen=True)
class LogEntry:
    """Immutable log entry data."""
    
    row_index: int           # Row index in the model
    timestamp: str           # Formatted timestamp string
    category: str            # Category path (e.g., "HordeMode/scripts/app")
    raw_message: str         # Original message with level prefix
    display_message: str     # Message with level prefix removed
    level: LogLevel          # Log level enum
    file_offset: int          # Byte offset in file for seeking
    raw_line: str            # Original line for copying
    
    # Note: This is a frozen dataclass (immutable)
    # Use dataclass replacement pattern for modifications
```

### §2.2 LogLevel

```python
from enum import Enum

class LogLevel(Enum):
    """Log level enumeration.
    
    Maps log level strings from parsed logs to enum values.
    """
    
    CRITICAL = "LOG_CRITICAL"
    ERROR = "LOG_ERROR"
    WARNING = "LOG_WARNING"
    MSG = "LOG_MSG"
    DEBUG = "LOG_DEBUG"
    TRACE = "LOG_TRACE"
    
    @classmethod
    def from_string(cls, name: str) -> LogLevel:
        """Parse log level from string."""
        
    def to_icon(self) -> str:
        """Get the icon character for this level."""
        
    def to_color(self) -> str:
        """Get the color name for this level."""
```

### §2.3 LogDocument

```python
from pathlib import Path
from typing import Iterator

class LogDocument:
    """Document representing a log file."""
    
    def __init__(self, filepath: str) -> None:
        """
        Initialize a log document.
        
        Args:
            filepath: Path to the log file
            
        Raises:
            FileNotFoundError: If file does not exist
            PermissionError: If file cannot be read
        """
    
    @property
    def filepath(self) -> str:
        """Get the file path."""
        
    @property
    def filename(self) -> str:
        """Get the file name."""
        
    @property
    def line_count(self) -> int:
        """Get the total line count."""
        
    def get_entries(self) -> list[LogEntry]:
        """Get all log entries."""
        
    def get_entry(self, index: int) -> LogEntry | None:
        """Get entry at index."""
        
    def get_entries_range(self, start: int, end: int) -> list[LogEntry]:
        """Get entries in range [start, end)."""
        
    def reload(self) -> None:
        """Reload the file from disk."""
        
    def close(self) -> None:
        """Release resources."""
    
    def __enter__(self) -> LogDocument:
        """Context manager entry."""
        
    def __exit__(self, *args) -> None:
        """Context manager exit."""
```

### §2.4 CategoryDisplayNode

```python
from dataclasses import dataclass, field

@dataclass
class CategoryDisplayNode:
    """Display node for category tree view.
    
    This is a display model used by the UI to show the category tree.
    It is transformed from CategoryNode (internal tree structure) by
    build_category_display_nodes() function.
    
    Note: This is separate from CategoryNode which is used internally
    by CategoryTree for filtering logic.
    """
    
    name: str                           # Display name (last part of path)
    path: str                           # Full path (e.g., "HordeMode/scripts/app")
    checked: bool = True                # Checkbox state for UI
    children: list[CategoryDisplayNode] = field(default_factory=list)
```

### §2.5 CategoryNode

```python
from dataclasses import dataclass, field

@dataclass
class CategoryNode:
    """Node in category tree (internal).
    
    This is the internal tree structure used by CategoryTree for
    filtering and visibility logic. It is NOT used directly by the UI.
    
    Use build_category_display_nodes() to transform CategoryNode tree to
    CategoryDisplayNode list for display.
    """
    
    name: str                           # Node name (e.g., "app")
    full_path: str                      # Full path (e.g., "HordeMode/scripts/app")
    parent: CategoryNode | None = None  # Parent node reference
    children: dict[str, CategoryNode] = field(default_factory=dict)
    is_enabled: bool = True             # Enabled state for filtering
    is_custom: bool = False            # True for user-defined categories
    pattern: str | None = None          # Pattern for custom categories
```

