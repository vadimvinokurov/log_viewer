## §6 Services

### §6.1 StatisticsService

```python
class StatisticsService:
    """Service for computing log statistics."""
    
    def compute(self, entries: list[LogEntry]) -> dict[str, int]:
        """
        Compute statistics for entries.
        
        Args:
            entries: Log entries
            
        Returns:
            Dictionary with counts per level
        """
    
    def compute_visible(self, entries: list[LogEntry], 
                        visible: set[str]) -> dict[str, int]:
        """
        Compute statistics for visible entries.
        
        Args:
            entries: All log entries
            visible: Set of visible log level names
            
        Returns:
            Dictionary with counts per level
        """
```

