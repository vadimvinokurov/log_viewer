## §3 Core

### §3.1 FilterEngine

```python
from typing import Callable
from src.models.log_entry import LogEntry

class FilterEngine:
    """Engine for compiling and applying filters."""
    
    @staticmethod
    def compile(text: str, mode: str) -> CompiledFilter:
        """
        Compile a filter.
        
        Args:
            text: Filter text
            mode: Filter mode ('plain', 'regex', 'simple')
            
        Returns:
            CompiledFilter object
            
        Raises:
            FilterError: If filter is invalid
        """
    
    @staticmethod
    def compile_plain(text: str) -> CompiledFilter:
        """Compile a plain text filter."""
        
    @staticmethod
    def compile_regex(pattern: str) -> CompiledFilter:
        """Compile a regex filter."""
        
    @staticmethod
    def compile_simple(query: str) -> CompiledFilter:
        """Compile a simple query filter."""

class CompiledFilter:
    """A compiled filter that can be applied to entries."""
    
    def matches(self, entry: LogEntry) -> bool:
        """
        Check if entry matches the filter.
        
        Args:
            entry: Log entry to check
            
        Returns:
            True if entry matches
        """
    
    def get_predicate(self) -> Callable[[LogEntry], bool]:
        """Get a predicate function for filtering."""
```

### §3.2 CategoryTree

```python
from src.models.category_display_node import CategoryDisplayNode

class CategoryTree:
    """Tree structure for category filtering."""
    
    def __init__(self) -> None:
        """Initialize an empty tree."""
    
    @property
    def root(self) -> CategoryDisplayNode:
        """Get the root node."""
        
    def add_category(self, path: str) -> None:
        """Add a category path to the tree."""
        
    def get_node(self, path: str) -> CategoryDisplayNode | None:
        """Get a node by path."""
        
    def is_visible(self, path: str) -> bool:
        """Check if a category is visible (self or ancestor checked)."""
        
    def set_checked(self, path: str, checked: bool) -> None:
        """Set the checked state of a category."""
        
    def check_all(self, checked: bool) -> None:
        """Check or uncheck all categories."""
        
    def get_all_paths(self) -> list[str]:
        """Get all category paths."""
        
    def get_checked_paths(self) -> set[str]:
        """Get all checked category paths."""
        
    def get_states(self) -> dict[str, bool]:
        """Get all checkbox states."""
        
    def set_states(self, states: dict[str, bool]) -> None:
        """Restore checkbox states."""
        
    @staticmethod
    def build_from_entries(entries: list[LogEntry]) -> CategoryTree:
        """Build a tree from log entries."""
```

### §3.3 HighlightEngine

```python
from PySide6.QtGui import QColor

class HighlightEngine:
    """Engine for applying text highlights."""
    
    def __init__(self) -> None:
        """Initialize the engine."""
    
    def add_pattern(self, text: str, color: QColor, 
                    is_regex: bool = False) -> None:
        """Add a highlight pattern."""
        
    def remove_pattern(self, text: str) -> bool:
        """Remove a pattern by text."""
        
    def clear_patterns(self) -> None:
        """Clear all patterns."""
        
    def get_patterns(self) -> list[HighlightPattern]:
        """Get all patterns."""
        
    def highlight(self, text: str) -> list[tuple[int, int, QColor]]:
        """
        Get highlight ranges for text.
        
        Args:
            text: Text to highlight
            
        Returns:
            List of (start, end, color) tuples
        """

@dataclass
class HighlightPattern:
    """A highlight pattern."""
    text: str
    color: QColor
    is_regex: bool = False
```

### §3.4 SimpleQueryParser

```python
class SimpleQueryParser:
    """Parser for simple query language."""
    
    def __init__(self, query: str) -> None:
        """
        Initialize parser with query string.
        
        Args:
            query: Query string (e.g., "error AND category:Network")
        """
    
    def parse(self) -> QueryNode:
        """
        Parse the query.
        
        Returns:
            QueryNode AST
            
        Raises:
            QuerySyntaxError: If query is invalid
        """

class QueryNode:
    """AST node for query."""
    pass

class AndNode(QueryNode):
    """AND operation node."""
    left: QueryNode
    right: QueryNode

class OrNode(QueryNode):
    """OR operation node."""
    left: QueryNode
    right: QueryNode

class NotNode(QueryNode):
    """NOT operation node."""
    operand: QueryNode

class TextNode(QueryNode):
    """Text match node."""
    text: str
    field: str | None

class FieldNode(QueryNode):
    """Field match node."""
    field: str
    value: str
    operator: str  # ':', '=', '!=', etc.
```

