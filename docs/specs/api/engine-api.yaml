## §4 Controllers

### §4.1 MainController

```python
from PySide6.QtCore import QObject, Signal

class MainController(QObject):
    """Main application controller."""
    
    # Signals
    statistics_updated = Signal(dict)
    
    def __init__(self, window: MainWindow) -> None:
        """Initialize the controller."""
    
    # File operations
    def open_file(self, filepath: str) -> None:
        """Open a log file."""
        
    def close_file(self) -> None:
        """Close current file."""
        
    def refresh(self) -> None:
        """Refresh current file."""
    
    # Filter operations
    def get_filter_controller(self) -> FilterController:
        """Get the filter controller."""
        
    def get_highlight_engine(self) -> HighlightEngine:
        """Get the highlight engine."""
    
    # Lifecycle
    def close(self) -> None:
        """Clean up resources."""
```

### §4.2 FilterController

```python
class FilterController(QObject):
    """Controller for filter operations."""
    
    # Signals
    filter_applied = Signal(list)  # List[LogEntry]
    filter_error = Signal(str)
    
    def __init__(self, parent: QObject | None = None) -> None:
        """Initialize the filter controller."""
    
    # Text filter
    def set_filter_text(self, text: str) -> None:
        """Set filter text."""
        
    def set_filter_mode(self, mode: str) -> None:
        """Set filter mode ('plain', 'regex', 'simple')."""
        
    def clear_filter(self) -> None:
        """Clear text filter."""
    
    # Category filter
    def set_category_tree(self, tree: CategoryTree) -> None:
        """Set category tree."""
        
    def toggle_category(self, path: str, checked: bool) -> None:
        """Toggle category visibility."""
        
    def check_all_categories(self, checked: bool) -> None:
        """Check/uncheck all categories."""
    
    # Counter filter
    def toggle_counter(self, counter_type: str, visible: bool) -> None:
        """Toggle log level visibility."""
    
    # Apply
    def apply_filter(self, entries: list[LogEntry]) -> list[LogEntry]:
        """Apply all filters to entries."""
```

